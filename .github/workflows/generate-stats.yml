name: Generate Stats Images

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write # Push를 위한 쓰기 권한 명시

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          cache: 'pip' # 복잡한 actions/cache 스텝을 이 옵션 하나로 대체

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Generate images
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXCLUDED: ${{ secrets.EXCLUDED }}
          EXCLUDED_LANGS: ${{ secrets.EXCLUDED_LANGS }}
          COUNT_STATS_FROM_FORKS: ${{ secrets.COUNT_STATS_FROM_FORKS }}
        run: |
          python generate_images.py

      - name: Commit to the output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Orphan 브랜치를 생성하고 필요한 폴더(generated)만 옮겨서 커밋
          git checkout --orphan output
          git rm -rf .
          git checkout main -- generated/
          git add generated/

          git commit -m "chore: update stats images" || echo "No changes to commit"
          git push origin output --force # 강제로 output 브랜치 덮어쓰기