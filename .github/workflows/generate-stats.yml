name: Generate Stats Images

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write # Push를 위한 쓰기 권한 명시

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          cache: 'pip' # 복잡한 actions/cache 스텝을 이 옵션 하나로 대체

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Generate images
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXCLUDED: ${{ secrets.EXCLUDED }}
          EXCLUDED_LANGS: ${{ secrets.EXCLUDED_LANGS }}
          COUNT_STATS_FROM_FORKS: ${{ secrets.COUNT_STATS_FROM_FORKS }}
        run: |
          python generate_images.py

      - name: Commit to the output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 1. generated 폴더 존재 여부 확인
          if [ ! -d "generated" ]; then
            echo "Error: 'generated' directory not found. Script might have failed."
            exit 1
          fi

          # 2. 임시 폴더로 결과물 복사
          mkdir ../temp_generated
          cp -r generated/* ../temp_generated/

          # 3. 브랜치 전환 및 초기화
          git checkout --orphan output
          git rm -rf .
          
          # 4. 결과물 복원 및 커밋
          mkdir generated
          cp -r ../temp_generated/* generated/
          git add generated/
          
          git commit -m "chore: update stats images" || echo "No changes to commit"
          git push origin output --force