name: Generate Stats Images

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write # Push를 위한 쓰기 권한 명시

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          cache: 'pip' # 복잡한 actions/cache 스텝을 이 옵션 하나로 대체

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Generate images
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXCLUDED: ${{ secrets.EXCLUDED }}
          EXCLUDED_LANGS: ${{ secrets.EXCLUDED_LANGS }}
          COUNT_STATS_FROM_FORKS: ${{ secrets.COUNT_STATS_FROM_FORKS }}
        run: |
          python generate_images.py

      - name: Commit to the output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 1. generated 폴더가 없으면 에러 내고 중단 (스크립트 실행 확인)
          if [ ! -d "generated" ]; then
            echo "Error: 'generated' directory not found."
            exit 1
          fi

          # 2. 결과물을 안전한 임시 장소로 대피
          rm -rf /tmp/generated_backup
          cp -r generated /tmp/generated_backup

          # 3. 브랜치 전환 및 완전 초기화
          git checkout --orphan output
          git rm -rf .
          
          # 4. 결과물 복원 (이미 존재할 경우 대비해 -p 사용 및 강제 덮어쓰기)
          mkdir -p generated
          cp -r /tmp/generated_backup/* generated/
          
          # 5. 커밋 및 푸시
          git add generated/
          git commit -m "chore: update stats images" || echo "No changes to commit"
          git push origin output --force