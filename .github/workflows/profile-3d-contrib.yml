name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  push:
    branches:
      - main
  workflow_dispatch: # GitHub 웹 UI에서 수동으로 실행할 수 있도록 추가

permissions:
  contents: write # Push를 위한 쓰기 권한 명시

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4
      
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          
      - name: Commit & Push
        run: |
          # 공식 GitHub Actions 봇 계정 사용
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git checkout -b output-3d
          git add profile-3d-contrib/ # 전체(.) 대신 생성된 폴더만 타겟팅
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "chore: update 3D contribution graph"
          git push origin output-3d --force