name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  push:
    branches:
      - src
  workflow_dispatch: # GitHub 웹 UI에서 수동으로 실행할 수 있도록 추가

permissions:
  contents: write # Push를 위한 쓰기 권한 명시

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4
      
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          
      - name: Commit & Push
        run: |
          # 공식 GitHub Actions 봇 계정 사용
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 1. 결과물을 안전한 임시 장소로 대피
          rm -rf /tmp/profile-3d-backup
          cp -r profile-3d-contrib /tmp/profile-3d-backup
          
          # 2. 독립적인 고아(Orphan) 브랜치 생성 및 기존 파일 완전 초기화
          git checkout --orphan output-3d
          git rm -rf .
          
          # 3. 결과물 복원
          mkdir -p profile-3d-contrib
          cp -r /tmp/profile-3d-backup/* profile-3d-contrib/
          
          # 4. 커밋 및 강제 푸시
          git add profile-3d-contrib/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "chore: update 3D contribution graph"
          git push origin output-3d --force